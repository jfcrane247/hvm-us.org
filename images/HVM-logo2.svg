<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" width="800" height="440" role="img" aria-label="Hope In The Valley Ministry banner logo">
  <title>Hope In The Valley Ministry</title>

  <!-- Transparent background -->

  <!--
    Banner lettermark: same design scaled 1.5×, no circle
    Total lettermark width: 420px, centered at x=400 (x: 190–610)
    Cap height: y=100–325 (225px tall)  — scale factor 1.5 from circle logo
    Cross top: y=55  (45px above cap, = 30×1.5)

    H  (x 190–303, 113px)  bar-width 36px, inner-gap 41px
    [15px gap]
    Cross+V  (x 318–482, 164px, center x=400)
    [15px gap]
    M  (x 497–610, 113px)
  -->

  <!-- === H  (x 190–303, y 100–325) === -->
  <!-- bar-width=36, inner-gap=41, crossbar at 39% of cap: 100+88=188, height 36 -->
  <path d="M 190,325
           L 190,100  L 226,100
           L 226,188  L 267,188
           L 267,100  L 303,100
           L 303,325  L 267,325
           L 267,224  L 226,224
           L 226,325  Z"
        fill="#111111"/>

  <!-- === Cross + V  (center x=400) ===
       Vertical bar:  x 382–418, y 55–188  (36px wide, 133px tall)
       Crossbar:      x 318–482, y 188–224 (164px wide, 36px tall)
       Left V leg:    triangle (318,224)→(382,224)→(400,325)
       Right V leg:   triangle (418,224)→(482,224)→(400,325)
  -->
  <rect x="382" y="55"  width="36" height="133" fill="#111111"/>
  <rect x="318" y="188" width="164" height="36"  fill="#111111"/>
  <polygon points="318,224 382,224 400,325"       fill="#111111"/>
  <polygon points="418,224 482,224 400,325"       fill="#111111"/>

  <!-- === M  (x 497–610, y 100–325) ===
       Left bar 497–533, right bar 574–610
       Inner V-notch: (533,100)→(554,213)→(574,100)
  -->
  <path d="M 497,325
           L 497,100  L 533,100
           L 554,213
           L 574,100  L 610,100
           L 610,325  Z"
        fill="#111111"/>

  <!-- "Hope In The Valley" -->
  <text x="400" y="374"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="44"
        fill="#111111">Hope In The Valley</text>

  <!-- Decorative rule + MINISTRY -->
  <line x1="218" y1="401" x2="290" y2="401" stroke="#111111" stroke-width="2"/>
  <text x="400" y="409"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="17"
        fill="#111111"
        letter-spacing="10">MINISTRY</text>
  <line x1="510" y1="401" x2="582" y2="401" stroke="#111111" stroke-width="2"/>
</svg>
