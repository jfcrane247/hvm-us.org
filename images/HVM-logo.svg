<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500" role="img" aria-label="Hope In The Valley Ministry circular logo">
  <title>Hope In The Valley Ministry</title>

  <!-- Outer circle border (transparent background) -->
  <circle cx="250" cy="222" r="210" fill="#ffffff" stroke="#111111" stroke-width="5.5"/>

  <!--
    Lettermark: HVM with cross replacing the V
    Lettermark total width: 280px, centered at x=250 (x: 110–390)
    Cap height: y=125–275 (150px tall)
    Cross top extends to y=95 (30px above cap height)

    H  (x 110–185, 75px wide, bar-width 24px, gap 27px)
    [10px gap]
    Cross+V  (x 195–305, 110px wide, center x=250)
    [10px gap]
    M  (x 315–390, 75px wide)
  -->

  <!-- === H === -->
  <!-- Traced clockwise: left-bar → crossbar-notch top → right-bar → crossbar-notch bottom -->
  <path d="M 110,275
           L 110,125  L 134,125
           L 134,183  L 161,183
           L 161,125  L 185,125
           L 185,275  L 161,275
           L 161,207  L 134,207
           L 134,275  Z"
        fill="#111111"/>

  <!-- === Cross + V ===
       Vertical bar:  x 237–263, y 95–183  (26px wide, 88px tall)
       Crossbar:      x 195–305, y 183–207 (110px wide, 24px tall)
       Left V leg:    triangle (195,207)→(237,207)→(250,275)
       Right V leg:   triangle (263,207)→(305,207)→(250,275)
  -->
  <rect x="237" y="95"  width="26" height="88"  fill="#111111"/>
  <rect x="195" y="183" width="110" height="24" fill="#111111"/>
  <polygon points="195,207 237,207 250,275"      fill="#111111"/>
  <polygon points="263,207 305,207 250,275"      fill="#111111"/>

  <!-- === M  (x 315–390) ===
       Left bar 315–339, right bar 366–390
       Inner V-notch from (339,125) down to (353,200) back to (366,125)
       Below the notch the area between bars is solid fill (closed polygon)
  -->
  <path d="M 315,275
           L 315,125  L 339,125
           L 353,200
           L 366,125  L 390,125
           L 390,275  Z"
        fill="#111111"/>

  <!-- "Hope In The Valley" -->
  <text x="250" y="316"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="30"
        fill="#111111">Hope In The Valley</text>

  <!-- Decorative rule + MINISTRY -->
  <line x1="116" y1="339" x2="172" y2="339" stroke="#111111" stroke-width="1.5"/>
  <text x="250" y="346"
        text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="12"
        fill="#111111"
        letter-spacing="7">MINISTRY</text>
  <line x1="328" y1="339" x2="384" y2="339" stroke="#111111" stroke-width="1.5"/>
</svg>
